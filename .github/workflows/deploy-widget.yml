name: 📤 Upload Widget ke Pinata

on:
  push:
    branches: [main]

jobs:
  upload-to-pinata:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📤 Upload setiap fail dalam widget/ ke Pinata
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          echo "📁 Memproses folder widget/"
          
          for FILE in widget/*; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              echo "📤 Upload: $FILENAME"
              
              curl -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
                -H "pinata_api_key: $PINATA_API_KEY" \
                -H "pinata_secret_api_key: $PINATA_SECRET_KEY" \
                -F "file=@$FILE" \
                -F "pinataMetadata={\"name\": \"$FILENAME\"}" \
                -F "pinataOptions={\"cidVersion\": 1}" \
                -o "response_$FILENAME.json"
              
              CID=$(grep -o '"IpfsHash":"[^"]*"' "response_$FILENAME.json" | cut -d'"' -f4)
              echo "✅ $FILENAME → CID: $CID"
              echo "🔗 URL: https://ipfs.io/ipfs/$CID"
              echo "🔗 URL: https://cloudflare-ipfs.com/ipfs/$CID"
              echo "🔗 URL: https://gateway.pinata.cloud/ipfs/$CID"
              echo ""
            fi
          done
          
          echo "🎉 Selesai! Semua fail telah di-upload."
