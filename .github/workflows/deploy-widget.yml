name: 📤 Deploy Widget ke IPFS via Pinata

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 📤 Upload ke Pinata
        uses: anantaramdas/ipfs-pinata-deploy-action@v1.6.1
        with:
          pinata_api_key: ${{ secrets.PINATA_API_KEY }}
          pinata_secret_api_key: ${{ secrets.PINATA_SECRET_KEY }}
          path: ./widget/
