name: 📤 Deploy Widget ke IPFS (Direct + Pin)

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🔍 Siasat struktur repo
        run: |
          echo "📁 Root repo:"
          ls -la
          echo ""
          echo "📁 Cari folder widget:"
          find . -name "widget" -type d 2>/dev/null || echo "❌ Folder widget tidak dijumpai!"

      - name: 🌐 Setup IPFS (Kubo)
        run: |
          echo "📁 Memasang IPFS Kubo..."
          wget https://dist.ipfs.tech/kubo/v0.30.0/kubo_v0.30.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.30.0_linux-amd64.tar.gz
          cd kubo
          sudo bash install.sh
          ipfs init
          ipfs daemon --offline &
          sleep 5
          echo "✅ IPFS Kubo sedia"

      - name: 📤 Upload folder widget ke IPFS (Direct)
        run: |
          echo "📁 Cari folder widget..."
          WIDGET_PATH=$(find . -name "widget" -type d 2>/dev/null | head -n 1)
          
          if [ -z "$WIDGET_PATH" ]; then
            echo "❌ Folder widget TIDAK DIJUMPAI!"
            exit 1
          fi
          
          echo "📁 Jumpa folder widget di: $WIDGET_PATH"
          echo "📁 Upload ke IPFS..."
          
          ipfs add -r "$WIDGET_PATH" --cid-version 1 > ipfs_output.txt
          
          CID=$(tail -n 1 ipfs_output.txt | awk '{print $2}')
          echo "📁 CID Folder: $CID"
          echo "CID=$CID" >> $GITHUB_ENV
          
          echo "🔗 URL: https://ipfs.io/ipfs/$CID/"

      - name: 📌 Pin CID di Pinata (Backup)
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          echo "📌 Pin CID ${{ env.CID }} di Pinata..."
          
          curl -X POST "https://api.pinata.cloud/pinning/pinByHash" \
            -H "pinata_api_key: $PINATA_API_KEY" \
            -H "pinata_secret_api_key: $PINATA_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"hashToPin\": \"${{ env.CID }}\"}"
          
          echo ""
          echo "✅ CID dipin di Pinata!"
