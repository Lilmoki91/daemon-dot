name: 📤 Deploy Widget ke IPFS (Direct + Pin)

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🌐 Setup IPFS dan Upload Folder
        id: upload_to_ipfs
        continue-on-error: true  # ← INI PENTING: Teruskan walaupun ada ralat
        run: |
          echo "📁 Memasang IPFS Kubo..."
          wget https://dist.ipfs.tech/kubo/v0.30.0/kubo_v0.30.0_linux-amd64.tar.gz
          tar -xvzf kubo_v0.30.0_linux-amd64.tar.gz
          cd kubo
          sudo bash install.sh
          ipfs init
          ipfs daemon --offline &
          sleep 5
          echo "✅ IPFS Kubo sedia"

          echo "📁 Upload folder widget ke IPFS..."
          ipfs add -r widget/ --cid-version 1 > ipfs_output.txt
          
          CID=$(tail -n 1 ipfs_output.txt | awk '{print $2}')
          echo "📁 CID Folder: $CID"
          
          if [ -z "$CID" ]; then
            echo "❌ Ralat: CID kosong."
            exit 1
          fi
          
          echo "CID=$CID" >> $GITHUB_OUTPUT
          echo "🔗 URL: https://ipfs.io/ipfs/$CID/"

      - name: 📌 Pin CID di Pinata (Backup)
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          CID="${{ steps.upload_to_ipfs.outputs.CID }}"
          
          if [ -z "$CID" ]; then
            echo "❌ CID kosong. Tak boleh pin."
            exit 1
          fi
          
          echo "📌 Pin CID: $CID di Pinata..."
          
          RESPONSE=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinByHash" \
            -H "pinata_api_key: $PINATA_API_KEY" \
            -H "pinata_secret_api_key: $PINATA_SECRET_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"hashToPin\": \"$CID\"}")
          
          echo "Respons: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q "error"; then
            echo "❌ Gagal pin: $RESPONSE"
            exit 1
          else
            echo "✅ Berjaya dipin di Pinata!"
          fi
