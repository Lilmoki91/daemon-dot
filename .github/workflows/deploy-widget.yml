name: 📤 Deploy Widget ke IPFS via Pinata

on:
  push:
    branches: [main]

jobs:
  deploy-to-ipfs:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📤 Upload widget ke Pinata (guna curl)
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
        run: |
          # Cari fail dalam folder widget/
          FILES=$(find ./widget/ -type f)
          
          # Bina arahan curl untuk setiap fail
          for FILE in $FILES; do
            echo "📤 Upload: $FILE"
            curl -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
              -H "pinata_api_key: $PINATA_API_KEY" \
              -H "pinata_secret_api_key: $PINATA_SECRET_KEY" \
              -F "file=@$FILE" \
              -F "pinataMetadata={\"name\": \"$(basename $FILE)\"}" \
              -F "pinataOptions={\"cidVersion\": 1, \"wrapWithDirectory\": true}"
            echo ""
          done
          
          echo "✅ Selesai!"
